<!DOCTYPE html>
<html>
<head>
    <title>Crash Multiplier Game</title>
    <style>
        body {
            height: 100vh;
            font-family: Arial;
            background: radial-gradient(circle at bottom, #0f2027, #203a43, #2c5364);
            color: white;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
        }

        .plane {
            font-size: 90px;
            position: absolute;
            top: 40%;
            left: -150px;
        }

        .panel {
            background: rgba(0,0,0,0.7);
            padding: 25px 40px;
            border-radius: 15px;
            text-align: center;
        }

        input {
            padding:10px;
            border-radius:8px;
            border:none;
            margin-bottom:10px;
        }

        button {
            padding:10px 20px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            background:#00c6ff;
            color:white;
            font-weight:bold;
        }

        #multiplier {
            margin-top:15px;
            font-size:32px;
            color:#00ff99;
        }

        @keyframes fly {
            from { left:-150px; }
            to { left:110%; }
        }

        @keyframes crash {
            0% { transform: rotate(0deg); }
            100% { transform: translateY(300px) rotate(180deg); opacity:0; }
        }
    </style>
</head>
<body>

<div class="plane" id="plane">✈️</div>

<div class="panel">
    <h2>🚀 Crash Game</h2>
    <input type="number" id="number" placeholder="Enter any number">
    <br>
    <button onclick="startGame()">Generate & Fly</button>
    <div id="multiplier"></div>
</div>

<script>
function generateCrash(userInput) {
    userInput = parseFloat(userInput);
    let house_edge = 0.99;

    let influence = Math.min(userInput / 1000.0, 1.0);

    let hash = 0;
    let str = userInput.toString();
    for (let i = 0; i < str.length; i++) {
        hash = ((hash << 5) - hash) + str.charCodeAt(i);
        hash |= 0;
    }

    let random_factor = Math.abs(hash % 1000000) / 1000000;

    let blended = (0.6 * random_factor) + (0.4 * influence);

    let r = blended * 0.666666;

    let multiplier = house_edge / (1 - r);

    return multiplier.toFixed(2);
}

function startGame() {
    let number = document.getElementById("number").value;
    let plane = document.getElementById("plane");
    let multiplierText = document.getElementById("multiplier");

    if(number === ""){
        alert("Enter number first!");
        return;
    }

    let multiplier = generateCrash(number);
    multiplierText.innerText = multiplier + "x";

    plane.style.animation = "none";
    plane.style.left = "-150px";
    plane.style.opacity = "1";

    let duration = multiplier * 2;

    plane.style.animation = `fly ${duration}s linear forwards`;

    setTimeout(() => {
        plane.style.animation = `crash 1.5s ease-in forwards`;
    }, duration * 1000);
}
</script>

</body>
</html>
