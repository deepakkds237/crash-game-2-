<!DOCTYPE html>
<html>
<head>
    <title>Crash Multiplier Game</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        body {
            height: 100vh;
            font-family: Arial;
            background: radial-gradient(circle at bottom, #0f2027, #203a43, #2c5364);
            color: white;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            overflow:hidden;
        }

        .plane {
            font-size: 90px;
            position: absolute;
            top: 40%;
            left: -150px;
        }

        .panel {
            background: rgba(0,0,0,0.7);
            padding: 25px 40px;
            border-radius: 15px;
            text-align: center;
        }

        input {
            padding:10px;
            border-radius:8px;
            border:none;
            margin-bottom:10px;
        }

        button {
            padding:10px 20px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            background:#00c6ff;
            color:white;
            font-weight:bold;
        }

        #multiplier {
            margin-top:15px;
            font-size:32px;
            color:#00ff99;
        }

        @keyframes fly {
            from { left:-150px; }
            to { left:110%; }
        }

        @keyframes crash {
            0% { transform: rotate(0deg); }
            100% { transform: translateY(300px) rotate(180deg); opacity:0; }
        }
    </style>
</head>
<body>

<div class="plane" id="plane">✈️</div>

<div class="panel">
    <h2>🚀 Crash Game</h2>
    <input type="number" id="number" placeholder="Enter any number">
    <br>
    <button onclick="startGame()">Generate & Fly</button>
    <div id="multiplier"></div>
</div>

<script>

function generateCrash(userInput) {

    userInput = parseFloat(userInput);
    const house_edge = 0.99;

    // Step 1: Normalize influence
    const influence = Math.min(userInput / 1000.0, 1.0);

    // Step 2: SHA256 hash (exact Python style)
    const hash = CryptoJS.SHA256(userInput.toString()).toString();

    // First 16 hex characters
    const first16 = hash.slice(0, 16);

    // Use full 64-bit BigInt
    const int_value = BigInt("0x" + first16);
    const maxUint64 = 18446744073709551615n; // 0xFFFFFFFFFFFFFFFF

    // IMPORTANT: convert AFTER division to avoid precision loss
    const random_factor = Number(int_value) / Number(maxUint64);

    // Step 3: Blend
    const blended = (0.6 * random_factor) + (0.4 * influence);

    // Step 4: Safe range
    const r = blended * 0.666666;

    const multiplier = house_edge / (1 - r);

    // Exact Python-style rounding
    return (Math.round(multiplier * 100) / 100).toFixed(2);
}

function startGame() {

    let number = document.getElementById("number").value;
    let plane = document.getElementById("plane");
    let multiplierText = document.getElementById("multiplier");

    if(number === ""){
        alert("Enter number first!");
        return;
    }

    let multiplier = generateCrash(number);
    multiplierText.innerText = multiplier + "x";

    plane.style.animation = "none";
    plane.style.left = "-150px";
    plane.style.opacity = "1";

    let duration = multiplier * 2;

    plane.style.animation = `fly ${duration}s linear forwards`;

    setTimeout(() => {
        plane.style.animation = `crash 1.5s ease-in forwards`;
    }, duration * 1000);
}

</script>

</body>
</html>
